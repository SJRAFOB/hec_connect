name: hec_connect
description: "Application mobile pour la gestion des informations académiques d'HEC Biétry."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_messaging: ^16.2.2
  firebase_storage: ^13.4.1

  # State management
  provider: ^6.1.2

  # UI
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.0

  # Utils
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  image_picker: ^1.1.2
  file_picker: ^11.0.2
  url_launcher: ^6.2.5
  record: ^6.2.1
  audioplayers: ^6.1.0
  path_provider: ^2.1.4
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/